<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFD Photobooth</title>

<style>

body{
font-family:'Comic Sans MS',sans-serif;
background:linear-gradient(135deg,#ff7a18,#ffd700,#4facfe);
background-size:400% 400%;
animation:bgmove 12s infinite alternate;
color:white;
text-align:center;
margin:0;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

h2{
font-size:32px;
margin-top:15px;
text-shadow:2px 2px 6px rgba(0,0,0,0.3);
}

/* MAIN LAYOUT */

#main{
display:flex;
justify-content:center;
align-items:flex-start;
gap:30px;
margin-top:15px;
}

/* CAMERA BLOCK */

#cameraBlock{
display:flex;
flex-direction:column;
align-items:center;
}

/* CAMERA */

#cameraContainer{
position:relative;
background:white;
padding:12px;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

video{
width:760px;
border-radius:12px;
filter:grayscale(100%);
}

/* COUNTDOWN */

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:bold;
color:white;
text-shadow:4px 4px 15px black;
pointer-events:none;
}

/* BUTTONS */

#controls{
margin-top:15px;
}

button{
border:none;
padding:11px 20px;
margin:6px;
font-size:16px;
font-weight:bold;
border-radius:40px;
cursor:pointer;
color:white;
transition:0.25s;
box-shadow:0 5px 12px rgba(0,0,0,0.25);
}

button:hover{
transform:scale(1.06);
}

.startBtn{background:#2ecc71;}
.retakeBtn{background:#f39c12;}
.printBtn{background:#e74c3c;}

/* RECEIPT PREVIEW */

#strip{
width:175px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 6px 18px rgba(0,0,0,0.25);
color:black;
font-family:monospace;
font-size:10px;
text-align:center;
}

#photos img{
width:100%;
margin-bottom:2px;
filter:grayscale(100%);
}

#photos img:last-child{
margin-bottom:0;
}

.receiptHeader{
margin-bottom:6px;
}

.receiptFooter{
margin-top:6px;
}

/* PRINT SETTINGS */

@media print{

#cameraBlock,
h2{
display:none;
}

body{
background:white;
}

#strip{
width:80mm;
margin:auto;
padding:0;
box-shadow:none;
}

#photos img{
width:100%;
margin:0;
}

@page{
size:80mm auto;
margin:0;
}

}

</style>
</head>

<body>

<h2>🎉 CFD Fun Photobooth 🚶📸</h2>

<div id="main">

<div id="cameraBlock">

<div id="cameraContainer">
<video id="video" autoplay></video>
<div id="countdown"></div>
</div>

<div id="controls">
<button class="startBtn" onclick="startCapture()">📸 Start</button>
<button class="retakeBtn" onclick="retake()">🔁 Retake</button>
<button class="printBtn" onclick="printStrip()">🖨 Print</button>
</div>

</div>

<div id="strip">

<div class="receiptHeader">
-----------------------------<br>
<b>CFD PHOTOBOOTH</b><br>
Kediri Sunday Run<br><br>

<span id="datetime"></span>
<br><br>
</div>

<div id="photos"></div>

<div class="receiptFooter">

<br>
-----------------------------<br>

Items<br>
Jogging<br>
Friends<br>
Happiness<br><br>

Total: GOOD DAY<br><br>

Visit Again ❤️<br>

-----------------------------

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
