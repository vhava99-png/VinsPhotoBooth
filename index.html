<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFD Photobooth</title>

<style>

/* (your entire style section unchanged) */

</style>
</head>

<body>

<h2>🎉 CFD Fun Photobooth 🚶📸</h2>

<div id="main">

<div id="cameraBlock">

<div id="cameraContainer">
<video id="video" autoplay></video>
<div id="countdown"></div>
</div>

<div id="controls">
<button class="startBtn" onclick="startCapture()">📸 Start</button>
<button class="retakeBtn" onclick="retake()">🔁 Retake</button>
<button class="printBtn" onclick="sendToPrinter()">🖨 Print</button>
</div>

</div>

<div id="strip">

<div class="receiptHeader">
-----------------------------<br>
<b>CFD PHOTOBOOTH</b><br>
Kediri Sunday Run<br><br>

<span id="datetime"></span>
<br><br>
</div>

<div id="photos"></div>

<div class="receiptFooter">

<br>
-----------------------------<br>

Items<br>
Jogging<br>
Friends<br>
Happiness<br><br>

Total: GOOD DAY<br><br>

Visit Again ❤️<br>

-----------------------------

</div>

</div>

</div>

<script src="app.js"></script>

<!-- screenshot library -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

/* limit photos to 3 */

const MAX_PHOTOS = 3

/* send receipt to android printer */

async function sendToPrinter(){

const strip = document.getElementById("strip")

const canvas = await html2canvas(strip)

canvas.toBlob(async blob => {

const form = new FormData()
form.append("file", blob, "receipt.png")

try{

await fetch("http://10.76.127.1:3000/print",{
method:"POST",
body:form
})

alert("Sent to printer")

}catch(e){

alert("Printer not reachable")

}

})

}

</script>

</body>
</html>
