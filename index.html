<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CFD Photobooth</title>

<style>

body{
font-family:monospace;
text-align:center;
background:#f0f0f0;
margin:0;
padding:20px;
}

.container{
width:90%;
max-width:500px;
margin:auto;
}

video{
width:100%;
border-radius:10px;
}

.controls{
margin-top:10px;
}

button{
padding:10px 16px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
background:black;
color:white;
}

.receipt-preview{
margin-top:20px;
background:white;
padding:10px;
border-radius:6px;
}

.receipt{
width:72mm;
margin:auto;
text-align:center;
font-size:12px;
line-height:1.4;
}

.receipt img{
width:100%;
margin:3px 0;
}

.divider{
border-top:1px dashed black;
margin:6px 0;
}

/* PRINT SETTINGS */

@page{
size:80mm auto;
margin:0;
}

@media print{

body{
width:80mm;
margin:0;
padding:0;
background:white;
}

.container{
display:none;
}

.receipt-preview{
display:block;
}

.receipt{
width:72mm;
margin:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h2>CFD Photobooth</h2>

<video id="video" autoplay playsinline></video>

<div class="controls">

<button onclick="takePhoto()">Take Photo</button>

<button onclick="resetPhotos()">Reset</button>

<button onclick="printReceipt()">Print</button>

</div>

</div>

<div class="receipt-preview">

<div class="receipt" id="receipt">

<div class="divider"></div>

<div><b>CFD PHOTOBOOTH</b></div>
<div>Kediri Sunday Run</div>

<div id="datetime"></div>

<br>

<div id="photos"></div>

<div class="divider"></div>

<div>Items</div>
<div>Jogging</div>
<div>Friends</div>
<div>Happiness</div>

<br>

<div><b>Total: GOOD DAY</b></div>

<br>

<div>Visit Again ❤️</div>

<div class="divider"></div>

</div>

</div>

<script>

const video = document.getElementById("video");
const photosDiv = document.getElementById("photos");

let photos=[];

/* CAMERA */

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream;
});

/* DATE TIME */

function updateDateTime(){

const now=new Date();

const options={
month:"short",
year:"numeric"
};

const date=now.toLocaleDateString(undefined,options);

const time=now.toLocaleTimeString([],{
hour:"2-digit",
minute:"2-digit"
});

document.getElementById("datetime").innerText=date+" | "+time;

}

updateDateTime();

/* TAKE PHOTO */

function takePhoto(){

if(photos.length>=4)return;

const canvas=document.createElement("canvas");
canvas.width=576;
canvas.height=432;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0,canvas.width,canvas.height);

const img=document.createElement("img");
img.src=canvas.toDataURL("image/png");

photos.push(img.src);

renderPhotos();

}

/* SHOW PHOTOS */

function renderPhotos(){

photosDiv.innerHTML="";

photos.forEach(p=>{

const img=document.createElement("img");
img.src=p;

photosDiv.appendChild(img);

});

}

/* RESET */

function resetPhotos(){

photos=[];
renderPhotos();

}

/* PRINT */

function printReceipt(){

window.print();

}

</script>

</body>
</html>
